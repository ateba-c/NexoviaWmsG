apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexoflow-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexoflow-backend
  template:
    metadata:
      labels:
        app: nexoflow-backend
    spec:
      containers:
        - name: backend
          image: nexoflow/backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: config.settings.production

