services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: nexoflow
      POSTGRES_USER: nexoflow
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexoflow -d nexoflow"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"

  backend:
    build:
      context: ./backend
      dockerfile: ../infrastructure/docker/Dockerfile.backend
    command: /app/scripts/docker-entrypoint.sh
    environment:
      POSTGRES_DB: nexoflow
      POSTGRES_USER: nexoflow
      POSTGRES_PASSWORD: dev_password
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      REDIS_CHANNEL_URL: redis://redis:6379/1
      DJANGO_SETTINGS_MODULE: config.settings.development
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend
      DJANGO_CORS_ALLOWED_ORIGINS: http://localhost:5173
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/')\""]
      interval: 15s
      timeout: 5s
      retries: 10

  celery:
    build:
      context: ./backend
      dockerfile: ../infrastructure/docker/Dockerfile.backend
    command: celery -A config worker -Q high,default,labels -l info --concurrency=4
    environment:
      POSTGRES_DB: nexoflow
      POSTGRES_USER: nexoflow
      POSTGRES_PASSWORD: dev_password
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      REDIS_CHANNEL_URL: redis://redis:6379/1
      DJANGO_SETTINGS_MODULE: config.settings.development
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  channels:
    build:
      context: ./backend
      dockerfile: ../infrastructure/docker/Dockerfile.backend
    command: /app/scripts/docker-channels.sh
    environment:
      POSTGRES_DB: nexoflow
      POSTGRES_USER: nexoflow
      POSTGRES_PASSWORD: dev_password
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      REDIS_CHANNEL_URL: redis://redis:6379/1
      DJANGO_SETTINGS_MODULE: config.settings.development
    volumes:
      - ./backend:/app
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: ../infrastructure/docker/Dockerfile.frontend
    command: npm run dev -- --host
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
